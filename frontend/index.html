<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topo-Tracer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div>
            <h1>Topo-Tracer</h1>
            <p>Trace topology console</p>
          </div>
          <span id="sourceBadge" class="status-pill">API</span>
        </div>

        <section class="source-panel" aria-label="Trace source">
          <label for="apiBase">Backend</label>
          <div class="inline-field">
            <input id="apiBase" type="url" value="http://localhost:3000" spellcheck="false" />
            <button id="refreshTraces" type="button">Refresh</button>
          </div>
          <div class="import-row">
            <label class="file-button" for="jsonFile">Import JSON</label>
            <input id="jsonFile" type="file" accept=".json,application/json" />
            <button id="clearOffline" type="button" class="secondary">API Mode</button>
          </div>
        </section>

        <section class="trace-list-panel" aria-label="Traces">
          <div class="section-head">
            <h2>Traces</h2>
            <span id="traceCount">0</span>
          </div>
          <div id="traceList" class="trace-list"></div>
          <div class="pager">
            <button id="prevPage" type="button" class="secondary">Previous</button>
            <button id="nextPage" type="button" class="secondary">Next</button>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div class="trace-title">
            <span id="traceKicker">No trace selected</span>
            <h2 id="traceTitle">Load live traces or import JSON</h2>
          </div>
          <div class="toolbar-actions">
            <button id="exportPdf" type="button">Export PDF</button>
          </div>
        </header>

        <section class="controls" aria-label="Trace controls">
          <div class="segmented" role="tablist" aria-label="View mode">
            <button class="active" data-view="flow" type="button">Flow</button>
            <button data-view="containers" type="button">Containers</button>
            <button data-view="timeline" type="button">Timeline</button>
            <button data-view="json" type="button">JSON</button>
          </div>
          <div class="segmented compact" aria-label="Depth type">
            <button class="active" data-depth-type="global" type="button">Global</button>
            <button data-depth-type="local" type="button">Local</button>
          </div>
          <label class="zoom-control" for="depthSlider">
            <span>Depth <strong id="depthValue">0</strong>/<span id="depthMax">0</span></span>
            <input id="depthSlider" type="range" min="0" max="0" value="0" />
          </label>
        </section>

        <section class="stats-row" aria-label="Trace stats">
          <div><strong id="statNodes">0</strong><span>Nodes</span></div>
          <div><strong id="statEdges">0</strong><span>Edges</span></div>
          <div><strong id="statWires">0</strong><span>Wires</span></div>
          <div><strong id="statReady">Unknown</strong><span>Zoom</span></div>
        </section>

        <section id="emptyState" class="empty-state">
          <h3>Ready for telemetry</h3>
          <p>Connect to `carno.js` or import a trace JSON export. The layout keeps services separated, call depth explicit, and edge routing readable.</p>
        </section>

        <section id="errorState" class="error-state hidden"></section>

        <section id="flowView" class="view-surface"></section>
        <section id="containersView" class="view-surface hidden"></section>
        <section id="timelineView" class="view-surface hidden"></section>
        <section id="jsonView" class="view-surface hidden">
          <pre id="jsonOutput"></pre>
        </section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
